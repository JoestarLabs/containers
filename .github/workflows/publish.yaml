name: Build and Push OCI Images

on:
  push:
    branches: [main]
    paths:
      - 'caddy-docker-cloudflare/**'
      - 'plezy-relay/**'
  workflow_dispatch: # Allows manual triggers from the GitHub Actions UI

permissions:
  contents: read
  packages: write

jobs:
  # Detect which subdirectories changed to avoid unnecessary builds
  filter:
    runs-on: ubuntu-latest
    outputs:
      caddy: ${{ steps.changes.outputs.caddy }}
      plezy: ${{ steps.changes.outputs.plezy }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            caddy:
              - 'caddy-docker-cloudflare/**'
            plezy:
              - 'plezy-relay/**'

  # Build Job for caddy-docker-cloudflare
  build-caddy:
    needs: filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.filter.outputs.caddy == 'true' }}
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm # Native ARM64 GitHub Runner (No QEMU Emulation!)
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase owner name
        run: |
          echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Single-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: ./caddy-docker-cloudflare
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ env.OWNER_LOWER }}/caddy-docker-cloudflare:sha-${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=caddy-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=caddy-${{ matrix.arch }}

  # Merge Manifest Job for caddy-docker-cloudflare
  promote-caddy:
    needs: build-caddy
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG_LATEST="ghcr.io/${OWNER_LOWER}/caddy-docker-cloudflare:latest"
          TAG_SHA="ghcr.io/${OWNER_LOWER}/caddy-docker-cloudflare:sha-${{ github.sha }}"
          
          # Create and push manifest for commit SHA
          docker manifest create --amend $TAG_SHA \
            ghcr.io/${OWNER_LOWER}/caddy-docker-cloudflare:sha-${{ github.sha }}-amd64 \
            ghcr.io/${OWNER_LOWER}/caddy-docker-cloudflare:sha-${{ github.sha }}-arm64
          docker manifest push $TAG_SHA
          
          # Create and push manifest for latest
          docker manifest create --amend $TAG_LATEST \
            ghcr.io/${OWNER_LOWER}/caddy-docker-cloudflare:sha-${{ github.sha }}-amd64 \
            ghcr.io/${OWNER_LOWER}/caddy-docker-cloudflare:sha-${{ github.sha }}-arm64
          docker manifest push $TAG_LATEST

  # Build Job for plezy-relay
  build-plezy:
    needs: filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.filter.outputs.plezy == 'true' }}
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm # Native ARM64 GitHub Runner (No QEMU Emulation!)
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase owner name
        run: |
          echo "OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Single-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: ./plezy-relay
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ env.OWNER_LOWER }}/plezy-relay:sha-${{ github.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=plezy-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=plezy-${{ matrix.arch }}

  # Merge Manifest Job for plezy-relay
  promote-plezy:
    needs: build-plezy
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG_LATEST="ghcr.io/${OWNER_LOWER}/plezy-relay:latest"
          TAG_SHA="ghcr.io/${OWNER_LOWER}/plezy-relay:sha-${{ github.sha }}"
          
          # Create and push manifest for commit SHA
          docker manifest create --amend $TAG_SHA \
            ghcr.io/${OWNER_LOWER}/plezy-relay:sha-${{ github.sha }}-amd64 \
            ghcr.io/${OWNER_LOWER}/plezy-relay:sha-${{ github.sha }}-arm64
          docker manifest push $TAG_SHA
          
          # Create and push manifest for latest
          docker manifest create --amend $TAG_LATEST \
            ghcr.io/${OWNER_LOWER}/plezy-relay:sha-${{ github.sha }}-amd64 \
            ghcr.io/${OWNER_LOWER}/plezy-relay:sha-${{ github.sha }}-arm64
          docker manifest push $TAG_LATEST
